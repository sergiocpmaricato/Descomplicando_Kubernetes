apiVersion: v1
kind: Pod
metadata:
  labels:
    run: giropops
  name: giropops
spec:
  containers:
    - image: ubuntu
      name: ubuntu
      resources:
        requests:
          cpu: "0.3"
          memory: "64Mi"
        limits:
          cpu: "1.5"
          memory: "128Mi"
      args:
        - sleep
        - "1800"
  dnsPolicy: ClusterFirst
  restartPolicy: Always
