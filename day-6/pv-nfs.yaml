apiVersion: v1
kind: PersistentVolume
metadata:
  name: meu-pv-nfs
  labels:
    storage: nfs
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany  # Alterado para permitir múltiplos Pods
  persistentVolumeReclaimPolicy: Retain
  storageClassName: giropops # Garanta que seu PVC tenha isso também
  nfs:
    server: 192.168.3.3
    path: /mnt/nfs/