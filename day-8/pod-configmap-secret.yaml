apiVersion: v1
kind: Pod
metadata:
  name: "nginx-tls-pod"
  labels:
    app: "nginx"
spec:
  containers:
  - name: nginx-tls-pod
    image: "nginx:latest"
    ports:
    - containerPort: 80
    - containerPort: 443
    volumeMounts:
    - name: "nginx-config-volume"
      mountPath: "/etc/nginx/nginx.conf"
      subPath: "nginx.conf"
    - name: "nginx-tls"
      mountPath: "/etc/nginx/tls"
  volumes:
  - name: "nginx-config-volume"
    configMap:
      name: "nginx-config"
  - name: "nginx-tls"
    secret:
      secretName: "meu-servico-web-tls-secret"
      items:
        - key: "tls.crt"
          path: "tls.crt"
        - key: "tls.key"
          path: "tls.key"
  restartPolicy: Always